{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📝 用户注册</h1>
    <p>创建账号，保存你的自选基金</p>
</div>

<div class="card" style="max-width:400px;margin:0 auto;">
    <form id="registerForm" @submit.prevent="doRegister()">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" name="username" required
                   minlength="3" maxlength="50"
                   placeholder="3-50个字符">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" name="password" required
                   minlength="6"
                   placeholder="至少6个字符">
        </div>
        <div class="form-group">
            <label class="form-label">确认密码</label>
            <input type="password" class="form-input" name="confirm_password" required
                   minlength="6"
                   placeholder="再次输入密码">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;"
                :disabled="registering">
            <span x-show="!registering">注册</span>
            <span x-show="registering">注册中...</span>
        </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
        已有账号？ <a href="/login">立即登录</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('registerPage', () => ({
        registering: false,
        async doRegister() {
            const form = document.getElementById('registerForm');
            const pwd = form.password.value;
            const confirm = form.confirm_password.value;
            if (pwd !== confirm) {
                showToast('两次密码不一致', 'error');
                return;
            }
            this.registering = true;
            try {
                const resp = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        password: pwd,
                    }),
                });
                if (resp.ok) {
                    showToast('注册成功！请登录');
                    setTimeout(() => location.href = '/login', 1000);
                } else {
                    const err = await resp.json();
                    showToast(err.detail || '注册失败', 'error');
                }
            } catch (e) {
                showToast('注册失败: ' + e.message, 'error');
            } finally {
                this.registering = false;
            }
        },
    }));
});
Alpine.init();
</script>
{% endblock %}
