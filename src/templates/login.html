{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="page-header">
    <h1>🔐 用户登录</h1>
    <p>登录后可以保存自选基金</p>
</div>

<div class="card" style="max-width:400px;margin:0 auto;">
    <form id="loginForm" @submit.prevent="doLogin()">
        <div class="form-group">
            <label class="form-label">用户名</label>
            <input type="text" class="form-input" name="username" required
                   placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" name="password" required
                   placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;"
                :disabled="logging">
            <span x-show="!logging">登录</span>
            <span x-show="logging">登录中...</span>
        </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
        还没有账号？ <a href="/register">立即注册</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('loginPage', () => ({
        logging: false,
        async doLogin() {
            const form = document.getElementById('loginForm');
            const formData = new FormData(form);
            this.logging = true;
            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    body: formData,
                });
                if (resp.ok) {
                    showToast('登录成功！');
                    setTimeout(() => location.href = '/', 500);
                } else {
                    const err = await resp.json();
                    showToast(err.detail || '登录失败', 'error');
                }
            } catch (e) {
                showToast('登录失败: ' + e.message, 'error');
            } finally {
                this.logging = false;
            }
        },
    }));
});
Alpine.init();
</script>
{% endblock %}
