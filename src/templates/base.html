<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}基金定投分析{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="logo-icon">基</span>
            <span>基金定投分析</span>
        </a>
        <div class="navbar-links">
            <a href="/">基金搜索</a>
            <a href="/analysis">定投分析</a>
            <a href="/watchlist">自选基金</a>
        </div>
        <div class="navbar-user" id="navbarUser">
            <span class="loading">加载中...</span>
        </div>
    </nav>

    <!-- 页面内容 -->
    <main class="page-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast 通知 -->
    <div class="toast" id="toast"></div>

    <!-- 底部 -->
    <footer class="footer">
        <p>基金定投分析工具 | 数据来源于 AKShare | 仅供学习参考，不构成投资建议</p>
    </footer>

    <script>
        // 全局 Toast 工具
        window.showToast = function(msg, type = 'success') {
            const el = document.getElementById('toast');
            if (el) {
                el.textContent = msg;
                el.className = 'toast show ' + type;
                setTimeout(() => { el.className = 'toast'; }, 3000);
            }
        };

        // 导航栏用户状态
        (async function() {
            try {
                const resp = await fetch('/api/auth/me');
                const data = await resp.json();
                const container = document.getElementById('navbarUser');
                if (data.logged_in) {
                    container.innerHTML = '<span class="username">' + data.username + '</span>' +
                        '<button class="btn btn-sm" onclick="fetch(\'/api/auth/logout\',{method:\'POST\'}).then(()=>location.reload())">退出</button>';
                } else {
                    container.innerHTML = '<a href="/login" class="btn btn-sm">登录</a>' +
                        '<a href="/register" class="btn btn-sm btn-primary">注册</a>';
                }
            } catch(e) {
                document.getElementById('navbarUser').innerHTML = '<a href="/login" class="btn btn-sm">登录</a>' +
                    '<a href="/register" class="btn btn-sm btn-primary">注册</a>';
            }
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
